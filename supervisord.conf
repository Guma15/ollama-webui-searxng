[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/tmp/supervisord.pid

[program:ollama]
command=/usr/local/bin/ollama serve
environment=OLLAMA_HOST="0.0.0.0:11434"
autorestart=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:open-webui]
command=open-webui serve --host 0.0.0.0 --port 8080
environment=DATA_DIR="/data/openwebui",WEBUI_SECRET_KEY_FILE="/data/openwebui/.webui_secret_key"
autorestart=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:searxng]
directory=/opt/searxng-src
command=/opt/searxng-venv/bin/python -m searx.webapp
environment=SEARXNG_SETTINGS_PATH="/etc/searxng/settings.yml",SEARXNG_BASE_URL="http://localhost:8081/",SEARXNG_PORT="8081",SEARXNG_BIND_ADDRESS="0.0.0.0",SEARXNG_SECRET="change-me-local-dev-secret"
autorestart=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0